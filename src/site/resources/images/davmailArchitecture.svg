    </linearGradient>
    <linearGradient id="iconB" x1="59.337" x2="59.337" y1="115.615" y2="5.11" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffa700"/>
      <stop offset=".691" stop-color="#ff0"/>
    </linearGradient>
    <linearGradient id="iconC" x1="59.316" x2="59.316" y1="-7.13" y2="58.984" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff0"/>
      <stop offset=".166" stop-color="#ffff25"/>
      <stop offset=".538" stop-color="#ffff83"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="iconD" x1="59.337" x2="59.337" y1="95.426" y2="18.379" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d96a00"/>
      <stop offset="1" stop-color="#560000"/>
    </linearGradient>
    <linearGradient id="iconE" x1="59.337" x2="59.337" y1="-1.44" y2="104.815" gradientUnits="userSpaceOnUse">
      <stop offset=".046" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
