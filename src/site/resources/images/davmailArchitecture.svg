  </g>

  <text x="620" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1b5e20">Protocol Translation</text>
  <text x="620" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1b5e20">Authentication</text>
  <text x="620" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1b5e20">Caching</text>

  <rect x="545" y="340" width="150" height="30" rx="6" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="620" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1b5e20">Windows / Linux / macOS</text>

  <rect x="545" y="380" width="150" height="30" rx="6" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="620" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1b5e20">Server or Desktop mode</text>

  <!-- Exchange / O365 -->
  <rect x="780" y="60" width="290" height="400" rx="12" fill="url(#exchangeGrad)" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="925" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Microsoft Exchange</text>

  <rect x="805" y="120" width="240" height="50" rx="8" fill="#ffffff" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="925" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#bf360c">On-Premises Exchange</text>
  <text x="925" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6d4c41">Exchange Web Services (EWS)</text>

  <rect x="805" y="185" width="240" height="50" rx="8" fill="#ffffff" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="925" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#bf360c">Office 365</text>
  <text x="925" y="223" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6d4c41">EWS or Microsoft Graph API</text>

  <rect x="805" y="250" width="240" height="50" rx="8" fill="#ffffff" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="925" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#bf360c">Outlook Web Access (OWA)</text>
  <text x="925" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6d4c41">Legacy WebDAV / HTTP</text>

  <rect x="805" y="315" width="240" height="50" rx="8" fill="#ffffff" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="925" y="335" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#bf360c">OAuth 2.0 / Modern Auth</text>
  <text x="925" y="353" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6d4c41">Interactive &amp; Transparent authentication</text>

  <!-- Arrows: Clients -> Protocols -->
  <line x1="250" y1="260" x2="298" y2="260" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Protocols -> Gateway -->
  <line x1="460" y1="260" x2="518" y2="260" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Gateway -> Exchange -->
  <line x1="720" y1="260" x2="778" y2="260" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="749" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#546e7a">HTTPS</text>

</svg>
