<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="1100" height="500">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="exchangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="#fafafa" rx="12"/>



  <!-- Mail Clients Group -->
  <rect x="30" y="60" width="220" height="400" rx="12" fill="url(#clientGrad)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Mail Clients</text>

  <rect x="50" y="108" width="180" height="40" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="148" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a237e">Thunderbird</text>

  <rect x="50" y="160" width="180" height="40" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="140" y="185" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a237e">Apple Mail</text>

  <rect x="50" y="212" width="180" height="40" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="148" y="237" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a237e">Evolution</text>

  <rect x="50" y="264" width="180" height="40" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="148" y="289" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a237e">Outlook</text>

  <rect x="50" y="316" width="180" height="40" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="140" y="341" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a237e">Other email clients</text>


  <!-- Protocols column -->
  <rect x="300" y="60" width="160" height="400" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Protocols</text>

  <rect x="320" y="115" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="138" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">POP3</text>

  <rect x="320" y="163" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="186" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">IMAP</text>

  <rect x="320" y="211" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="234" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">SMTP</text>

  <rect x="320" y="259" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="282" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">CalDAV</text>

  <rect x="320" y="307" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">CardDAV</text>

  <rect x="320" y="355" width="120" height="36" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="378" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a148c">LDAP</text>

  <!-- DavMail Gateway -->
  <rect x="520" y="60" width="200" height="400" rx="12" fill="url(#gatewayGrad)" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">DavMail Gateway</text>

